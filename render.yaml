services:
  - type: web
    name: cscl-script-studio
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "import os; os.makedirs('data/course_documents', exist_ok=True)"
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: qwen
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_ENABLED
        value: "true"
      - key: QWEN_IMPLEMENTED
        value: "true"
      - key: LLM_PROVIDER_PRIMARY
        value: qwen
      - key: LLM_PROVIDER_FALLBACK
        value: openai
      - key: LLM_STRATEGY
        value: primary_with_fallback
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ENABLED
        value: "true"
      - key: OPENAI_IMPLEMENTED
        value: "true"
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: DEMO_MODE
        value: "true"
      - key: QUICK_DEMO_PUBLIC
        value: "true"
      - key: PDF_MAX_PAGES
        value: "200"
      - key: DOCUMENT_MAX_FILE_SIZE_MB
        value: "10"
