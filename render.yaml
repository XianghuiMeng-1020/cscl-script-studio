services:
  - type: web
    name: cscl-script-studio
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "import os; os.makedirs('data/course_documents', exist_ok=True)"
    # Use 1 worker when no DATABASE_URL (in-memory SQLite is per-process); set DATABASE_URL + workers 2+ for production scale
startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: qwen
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_ENABLED
        value: "true"
      - key: QWEN_IMPLEMENTED
        value: "true"
      - key: DEMO_MODE
        value: "true"
      - key: QUICK_DEMO_PUBLIC
        value: "true"
      - key: PDF_MAX_PAGES
        value: "200"
      - key: DOCUMENT_MAX_FILE_SIZE_MB
        value: "10"
