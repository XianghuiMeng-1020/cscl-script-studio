<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - CSCL Script Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ static_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student.css') }}?v={{ static_version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='fontawesome/css/all.min.css') }}?v={{ static_version }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="student-page">
    <div class="student-app">
        <!-- Top Nav: no sidebar -->
        <header class="student-topnav">
            <div class="topnav-left">
                <a href="/" class="logo-link">
                    <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.75"/>
                        <circle cx="22" cy="10" r="3" stroke="currentColor" stroke-width="1.75"/>
                        <circle cx="16" cy="22" r="3" stroke="currentColor" stroke-width="1.75"/>
                        <line x1="10" y1="10" x2="16" y2="22" stroke="currentColor" stroke-width="1.75"/>
                        <line x1="22" y1="10" x2="16" y2="22" stroke="currentColor" stroke-width="1.75"/>
                        <line x1="10" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="1.75"/>
                        <path d="M24 28 L28 28 L28 24" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="home.title">CSCL Script Studio</span>
                </a>
            </div>
            <div class="topnav-right">
                <select id="languageSelect" onchange="switchLanguage(this.value)" class="topnav-lang" aria-label="Language">
                    <option value="zh-CN">简体中文</option>
                    <option value="zh-TW">繁體中文</option>
                    <option value="en">English</option>
                </select>
                <div class="topnav-user">
                    <i class="fas fa-user" aria-hidden="true"></i>
                    <span class="topnav-role" data-i18n="student.user.role">学生</span>
                </div>
                <a href="/logout" class="topnav-logout" data-i18n="common.logout">退出</a>
            </div>
        </header>

        <!-- Main: two columns -->
        <main class="student-main">
            <!-- Left: Activity Panel (~65%) -->
            <section class="student-activity-panel">
                <!-- Join / No activity state -->
                <div id="studentJoinBlock" class="student-join-block">
                    <div class="join-card">
                        <i class="fas fa-users" aria-hidden="true"></i>
                        <h2 data-i18n="student.activity.join_title">加入协作活动</h2>
                        <p data-i18n="student.activity.join_hint">输入老师分享的邀请码，或打开分享链接自动填入。</p>
                        <div class="join-input-row">
                            <input type="text" id="shareCodeInput" placeholder="ABC123" maxlength="12" aria-label="Invite code" />
                            <button type="button" id="joinActivityBtn" class="btn-primary" data-i18n="student.activity.join">加入</button>
                        </div>
                        <p id="joinError" class="join-error hidden"></p>
                    </div>
                </div>

                <!-- Activity loaded state -->
                <div id="studentActivityBlock" class="student-activity-block hidden">
                    <div class="activity-header-card">
                        <h1 id="activityTitle" class="activity-title">--</h1>
                        <p id="activityMeta" class="activity-meta">--</p>
                        <div id="sceneProgress" class="scene-progress" aria-label="Scene progress">
                            <span data-i18n="student.scene.progress">场景</span> <span id="sceneProgressText">1/1</span>
                        </div>
                    </div>

                    <div id="currentSceneCard" class="scene-card">
                        <h3 class="scene-card-title"><i class="fas fa-map-marker-alt" aria-hidden="true"></i> <span id="scenePurposeLabel" data-i18n="student.scene.purpose">本场景目标</span></h3>
                        <p id="scenePurpose" class="scene-purpose">--</p>
                        <h4 class="scene-card-subtitle"><i class="fas fa-user-tag" aria-hidden="true"></i> <span id="myRoleLabel" data-i18n="student.scene.your_role">你的角色</span></h4>
                        <p id="myRoleText" class="my-role">--</p>
                        <h4 class="scene-card-subtitle"><i class="fas fa-tasks" aria-hidden="true"></i> <span data-i18n="student.scene.task">任务</span></h4>
                        <div id="sceneTaskContent" class="scene-task-content">--</div>
                        <div class="submission-area">
                            <label for="submissionTextarea"><span data-i18n="student.submission.your_work">你的作答</span></label>
                            <textarea id="submissionTextarea" rows="4" placeholder=""></textarea>
                            <div class="submission-actions">
                                <button type="button" id="saveDraftBtn" class="btn-secondary" data-i18n="student.submission.save_draft">保存草稿</button>
                                <button type="button" id="submitSceneBtn" class="btn-primary" data-i18n="student.submission.submit">提交</button>
                            </div>
                        </div>
                    </div>
                    <div class="scene-nav">
                        <button type="button" id="scenePrevBtn" class="btn-secondary" data-i18n="student.scene.prev">上一场景</button>
                        <button type="button" id="sceneNextBtn" class="btn-primary" data-i18n="student.scene.next">下一场景</button>
                    </div>

                    <div class="collapsible-row">
                        <details class="collapsible-detail">
                            <summary><i class="fas fa-lightbulb" aria-hidden="true"></i> <span data-i18n="student.collaboration">协作建议</span></summary>
                            <div id="collaborationTips" class="collapsible-body">
                                <ul>
                                    <li data-i18n="student.collaboration.tip1">积极倾听同伴的想法</li>
                                    <li data-i18n="student.collaboration.tip2">在他人贡献的基础上继续</li>
                                    <li data-i18n="student.collaboration.tip3">需要时提出澄清问题</li>
                                </ul>
                            </div>
                        </details>
                        <details class="collapsible-detail">
                            <summary><i class="fas fa-list-ul" aria-hidden="true"></i> <span data-i18n="student.scoring">评分标准摘要</span></summary>
                            <div id="scoringCriteria" class="collapsible-body">
                                <p data-i18n="common.no.data">暂无数据</p>
                            </div>
                        </details>
                    </div>
                </div>
            </section>

            <!-- Right: Chat Panel (~35%) -->
            <aside class="student-chat-panel">
                <div class="chat-header">
                    <i class="fas fa-comments" aria-hidden="true"></i>
                    <span data-i18n="student.chat.title">小组讨论</span>
                </div>
                <div id="chatMessages" class="chat-messages">
                    <div id="chatEmpty" class="chat-empty">
                        <i class="fas fa-comment-dots"></i>
                        <p data-i18n="student.chat.empty">加入活动后即可与同组同学聊天</p>
                    </div>
                </div>
                <div id="chatInputArea" class="chat-input-area hidden">
                    <textarea id="chatInput" rows="2" placeholder="" data-i18n-placeholder="student.chat.placeholder" maxlength="5000"></textarea>
                    <button type="button" id="chatSendBtn" class="btn-primary" data-i18n="student.chat.send">发送</button>
                </div>
            </aside>
        </main>
    </div>

    <div id="notification" class="notification"></div>

    <script src="{{ url_for('static', filename='js/i18n.js') }}?v={{ static_version }}"></script>
    <script src="{{ url_for('static', filename='js/student.js') }}?v={{ static_version }}"></script>
    <script>
        function switchLanguage(locale) { setLocale(locale); }
        document.addEventListener('DOMContentLoaded', function() {
            var sel = document.getElementById('languageSelect');
            if (sel) sel.value = typeof currentLocale !== 'undefined' ? currentLocale : 'zh-CN';
            if (typeof applyLocaleToPage === 'function') applyLocaleToPage();
        });
    </script>
</body>
</html>
